<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portafolio Inmobiliario - Century 21">
    <title>Clauuu | Century 21</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <main class="container">
        <header class="profile-section">
            <div class="profile-image-container">
                <!-- Placeholder for profile picture -->
                <img src="https://ui-avatars.com/api/?name=Clauuu+C21&background=bea25c&color=fff&size=150" alt="Clauuu Century 21" class="profile-image">
            </div>
            <h1 class="profile-name">Clauuu</h1>
            <p class="profile-title">Asesora Inmobiliaria | Century 21</p>
            <p class="profile-bio">Te ayudo a encontrar la casa de tus sueños o la mejor inversión para tu futuro.</p>
        </header>

        <section class="links-section">
            <a href="#" class="link-card" target="_blank" rel="noopener">
                <div class="link-icon"><i class="fa-brands fa-whatsapp"></i></div>
                <div class="link-text">Contáctame por WhatsApp</div>
                <div class="link-arrow"><i class="fa-solid fa-chevron-right"></i></div>
            </a>

            <a href="#" class="link-card" target="_blank" rel="noopener">
                <div class="link-icon"><i class="fa-solid fa-envelope"></i></div>
                <div class="link-text">Envíame un Correo</div>
                <div class="link-arrow"><i class="fa-solid fa-chevron-right"></i></div>
            </a>

            <a href="#" class="link-card" target="_blank" rel="noopener">
                <div class="link-icon"><i class="fa-brands fa-instagram"></i></div>
                <div class="link-text">Sígueme en Instagram</div>
                <div class="link-arrow"><i class="fa-solid fa-chevron-right"></i></div>
            </a>
            
            <a href="#" class="link-card" target="_blank" rel="noopener">
                <div class="link-icon"><i class="fa-brands fa-facebook"></i></div>
                <div class="link-text">Sígueme en Facebook</div>
                <div class="link-arrow"><i class="fa-solid fa-chevron-right"></i></div>
            </a>

            <a href="#" class="link-card" target="_blank" rel="noopener">
                <div class="link-icon"><i class="fa-brands fa-tiktok"></i></div>
                <div class="link-text">Sígueme en TikTok</div>
                <div class="link-arrow"><i class="fa-solid fa-chevron-right"></i></div>
            </a>
        </section>

        <footer class="footer">
            <div class="social-links">
                <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#" aria-label="Tiktok"><i class="fa-brands fa-tiktok"></i></a>
            </div>
            <p class="branding">Century 21 &copy; 2026</p>
        </footer>
    </main>
</body>
</html>
